<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTP Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>KTP Management System</h1>
            <p>Admin Dashboard for Identity Records</p>
        </header>

        <main>
            <section class="form-section card">
                <h2 id="form-title">Add New KTP</h2>
                <form id="ktp-form">
                    <input type="hidden" id="ktp-id">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nomorKtp">Nomor KTP</label>
                            <input type="text" id="nomorKtp" name="nomorKtp" maxlength="16" placeholder="16-digit ID number" required>
                        </div>
                        <div class="form-group">
                            <label for="namaLengkap">Nama Lengkap</label>
                            <input type="text" id="namaLengkap" name="namaLengkap" placeholder="Full Name" required>
                        </div>
                        <div class="form-group">
                            <label for="tanggalLahir">Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" name="tanggalLahir" required>
                        </div>
                        <div class="form-group">
                            <label for="jenisKelamin">Jenis Kelamin</label>
                            <select id="jenisKelamin" name="jenisKelamin" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="alamat">Alamat</label>
                            <textarea id="alamat" name="alamat" placeholder="Residential Address" required></textarea>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn btn-primary">Save Record</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none;">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="table-section card">
                <h2>KTP Records</h2>
                <div class="table-responsive">
                    <table id="ktp-table">
                        <thead>
                            <tr>
                                <th>No. KTP</th>
                                <th>Name</th>
                                <th>Address</th>
                                <th>DOB</th>
                                <th>Gender</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ktp-list">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div id="notification" class="notification"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
